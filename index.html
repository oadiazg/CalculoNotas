<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CalculoNotas – Calculadora de notas personalizada con materias y entregas." />
  <meta name="theme-color" content="#e53935" />

  <link rel="manifest" href="manifest.json" />

  <title>CalculoNotas – Calculadora de Notas</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ══ Auth Screen ══════════════════════════════════════════════ -->
  <div id="auth-screen" class="screen">
    <div class="auth-card">
      <div class="auth-logo">📚</div>
      <h1 class="auth-title">CalculoNotas</h1>
      <p class="auth-subtitle">Tu calculadora de notas personalizada</p>

      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" data-tab="login" role="tab" aria-selected="true">Iniciar Sesión</button>
        <button class="auth-tab" data-tab="register" role="tab" aria-selected="false">Registrarse</button>
      </div>

      <!-- Login form -->
      <form id="login-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="login-email">Correo electrónico</label>
          <input type="email" id="login-email" placeholder="correo@ejemplo.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="login-password">Contraseña</label>
          <input type="password" id="login-password" placeholder="Tu contraseña" autocomplete="current-password" />
        </div>
        <button type="button" id="login-btn" class="btn-primary btn-block">Iniciar Sesión</button>
      </form>

      <!-- Register form -->
      <form id="register-form" class="auth-form hidden" novalidate>
        <div class="form-group">
          <label for="reg-email">Correo electrónico</label>
          <input type="email" id="reg-email" placeholder="correo@ejemplo.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="reg-password">Contraseña</label>
          <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirmar contraseña</label>
          <input type="password" id="reg-confirm" placeholder="Repite la contraseña" autocomplete="new-password" />
        </div>
        <button type="button" id="register-btn" class="btn-primary btn-block">Crear Cuenta</button>
      </form>

      <p id="auth-error" class="error-msg hidden" role="alert"></p>
    </div>
  </div>

  <!-- ══ App Screen ════════════════════════════════════════════════ -->
  <div id="app-screen" class="screen hidden">

    <header>
      <div class="header-content">
        <h1>📚 CalculoNotas</h1>
        <div class="header-user">
          <span id="user-email-display" class="user-email"></span>
          <button type="button" id="logout-btn" class="btn-ghost-light">Salir</button>
        </div>
      </div>
    </header>

    <!-- ── Subjects view ── -->
    <div id="subjects-view">
      <main>
        <div class="view-header">
          <h2>Mis Materias</h2>
          <button type="button" id="add-subject-btn" class="btn-primary">+ Nueva Materia</button>
        </div>

        <div id="subjects-list"></div>

        <div id="no-subjects" class="empty-state hidden">
          <div class="empty-icon">📖</div>
          <p>No tienes materias aún.</p>
          <p class="empty-hint">¡Crea tu primera materia para empezar!</p>
        </div>
      </main>
    </div>

    <!-- ── Subject detail view ── -->
    <div id="subject-detail-view" class="hidden">
      <main>
        <div class="view-header">
          <button type="button" id="back-btn" class="btn-ghost">← Volver</button>
          <h2 id="subject-title"></h2>
          <button type="button" id="add-entrega-btn" class="btn-primary">+ Nueva Entrega</button>
        </div>

        <!-- Final grade summary -->
        <section id="final-card" aria-label="Nota final">
          <h2>Nota Final</h2>
          <div id="final-grade-display" aria-live="polite">–</div>
          <p id="final-status"></p>
          <p id="final-message" class="grade-message"></p>

          <div class="progress-bar-wrap" role="progressbar" aria-label="Progreso de la nota">
            <div class="progress-bar" id="progress-bar" style="width:0%"></div>
          </div>
          <p class="progress-label" id="progress-label"></p>
        </section>

        <div id="entregas-list"></div>

        <div id="no-entregas" class="empty-state hidden">
          <div class="empty-icon">📝</div>
          <p>No hay entregas para esta materia.</p>
          <p class="empty-hint">¡Agrega tu primera entrega!</p>
        </div>

        <div class="danger-zone">
          <button type="button" id="delete-subject-btn" class="btn-danger">🗑️ Eliminar Materia</button>
        </div>
      </main>
    </div>

  </div><!-- end #app-screen -->

  <!-- ══ Modals ════════════════════════════════════════════════════ -->

  <!-- Subject modal -->
  <div id="subject-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="subject-modal-title">
    <div class="modal-card">
      <h3 id="subject-modal-title">Nueva Materia</h3>
      <div class="form-group">
        <label for="subject-name-input">Nombre de la materia</label>
        <input type="text" id="subject-name-input" placeholder="Ej: Patología, Anatomía…" maxlength="80" />
      </div>
      <div class="modal-actions">
        <button type="button" id="subject-modal-cancel" class="btn-ghost">Cancelar</button>
        <button type="button" id="subject-modal-save" class="btn-primary">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Entrega modal -->
  <div id="entrega-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="entrega-modal-title">
    <div class="modal-card">
      <h3 id="entrega-modal-title">Nueva Entrega</h3>
      <div class="form-group">
        <label for="entrega-name-input">Nombre de la entrega</label>
        <input type="text" id="entrega-name-input" placeholder="Ej: Primer Corte, Parcial 1…" maxlength="80" />
      </div>
      <div class="form-group">
        <label for="entrega-pct-input">Porcentaje (%)</label>
        <input type="number" id="entrega-pct-input" placeholder="Ej: 25" min="1" max="100" step="1" />
      </div>
      <div class="form-group">
        <label for="entrega-date-input">Fecha de entrega <span class="label-optional">(opcional)</span></label>
        <input type="date" id="entrega-date-input" />
      </div>
      <div class="form-group">
        <label for="entrega-grade-input">Nota <span class="label-optional">(opcional, 0–5)</span></label>
        <input type="number" id="entrega-grade-input" placeholder="0.0 – 5.0" min="0" max="5" step="0.1" />
      </div>
      <div class="modal-actions">
        <button type="button" id="entrega-modal-cancel" class="btn-ghost">Cancelar</button>
        <button type="button" id="entrega-modal-save" class="btn-primary">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" role="status" aria-live="polite"></div>

  <!-- Emoji animation layer -->
  <div id="emoji-container" aria-hidden="true"></div>

  <script src="js/app.js"></script>
</body>
</html>
