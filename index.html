<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Calculadora de notas finales para la materia Patología – 4 cortes con componentes Teórico (16%) y Práctico (9%)." />
  <meta name="theme-color" content="#6c63ff" />

  <!-- PWA manifest (inline icons via SVG data-URI) -->
  <link rel="manifest" href="manifest.json" />

  <title>Patología – Calculadora de Notas</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header>
    <h1>🩺 Patología</h1>
    <p>Calculadora de Nota Final &nbsp;·&nbsp; 4 cortes × 25 %</p>
  </header>

  <main>
    <!-- Corte cards are injected here by app.js -->
    <div class="cortes-grid" id="cortes-container" role="list"></div>

    <!-- Final grade summary -->
    <section id="final-card" aria-label="Nota final">
      <h2>Nota Final</h2>
      <div id="final-grade-display" aria-live="polite">–</div>
      <p id="final-status"></p>

      <div class="progress-bar-wrap" role="progressbar" aria-label="Progreso de la nota">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <p class="progress-label" id="progress-label"></p>

      <button type="button" id="clear-btn">🗑️ Borrar todas las notas</button>
    </section>
  </main>

  <footer>
    <p>Las notas se guardan automáticamente en este dispositivo · Escala 0 – 5</p>
  </footer>

  <!-- Toast notification -->
  <div id="toast" role="status" aria-live="polite"></div>

  <script src="js/app.js"></script>
</body>
</html>
